name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Phase 1: Rust lib compile + test ──
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/feiq-core -> target

      - name: Check compilation
        run: cargo check --workspace

      - name: Run tests
        run: cargo test --workspace

  # ── Phase 2: Frontend type-check ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: packages/feiq-gui
        run: npm ci

      - name: TypeScript check
        working-directory: packages/feiq-gui
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: packages/feiq-gui
        run: npm run build

  # ── Phase 3: Tauri build (Linux only for PR checks) ──
  tauri-check:
    needs: [rust, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/feiq-core -> target

      - name: Install frontend deps
        working-directory: packages/feiq-gui
        run: npm ci

      - name: Build frontend
        working-directory: packages/feiq-gui
        run: npm run build

      - name: Install Linux system deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Check Tauri app compiles
        run: cargo check --manifest-path packages/feiq-app/Cargo.toml
