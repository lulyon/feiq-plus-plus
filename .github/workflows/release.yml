name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,      artifact: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,       artifact: macos-x64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    artifact: windows-x64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  artifact: linux-x64 }
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: packages/feiq-gui
        run: npm ci

      - name: Build frontend
        working-directory: packages/feiq-gui
        run: npm run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/feiq-core -> target

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        working-directory: packages/feiq-app
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Collect artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bundle/dmg/*.dmg artifacts/ || true
          ls artifacts/

      - name: Collect artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir artifacts -Force
          Copy-Item target/${{ matrix.target }}/release/bundle/nsis/*.exe artifacts/ -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/bundle/msi/*.msi artifacts/ -ErrorAction SilentlyContinue
          ls artifacts/

      - name: Collect artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/bundle/deb/*.deb artifacts/ || true
          cp target/${{ matrix.target }}/release/bundle/appimage/*.AppImage artifacts/ || true
          ls artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/*
          if-no-files-found: ignore

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - run: ls -R artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
