name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: macos-latest,   target: aarch64-apple-darwin,      artifact: macos-arm64 }
          - { os: macos-latest,   target: x86_64-apple-darwin,       artifact: macos-x64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    artifact: windows-x64 }
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  artifact: linux-x64 }
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend deps
        working-directory: packages/feiq-gui
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: "${{ matrix.target }}"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/feiq-core -> target

      - name: Install Linux system deps for Tauri
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Build frontend
        working-directory: packages/feiq-gui
        run: npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "feiq++ v__VERSION__"
          releaseBody: |
            ## Changes

            See [CHANGELOG.md](./CHANGELOG.md) for details.

            ## Downloads

            - **macOS**: `.dmg` for Intel and Apple Silicon
            - **Windows**: `.msi` / `.exe` installer
            - **Linux**: `.AppImage` and `.deb`
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
