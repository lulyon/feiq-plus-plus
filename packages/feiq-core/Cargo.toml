[package]
name = "feiq-core"
version = "0.1.4"
edition = "2021"
description = "Feiq++ protocol engine, network, and storage"

[dependencies]
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = "0.24"
futures-util = "0.3"
base64 = "0.22"
encoding_rs = "0.8"
rusqlite = { version = "0.32", features = ["bundled"] }
ring = "0.17"
x25519-dalek = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
mac_address = "1.1"
bitflags = "2"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
socket2 = "0.5"
