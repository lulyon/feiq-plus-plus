    <path d="M-1,-3.2 L1,-3.2 L1,-1 L3.2,-1 L3.2,1 L1,1 L1,3.2 L-1,3.2 L-1,1 L-3.2,1 L-3.2,-1 L-1,-1 Z" fill="#EDE6FF"/>
  </g>
  <g transform="translate(31.2, 31.7)" opacity="0.18">
    <path d="M-0.8,-2.4 L0.8,-2.4 L0.8,-0.8 L2.4,-0.8 L2.4,0.8 L0.8,0.8 L0.8,2.4 L-0.8,2.4 L-0.8,0.8 L-2.4,0.8 L-2.4,-0.8 L-0.8,-0.8 Z" fill="#EDE6FF"/>
