<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1530"/>
      <stop offset="50%" stop-color="#100C20"/>
      <stop offset="100%" stop-color="#0A0818"/>
    </linearGradient>
    <linearGradient id="dove" x1="4" y1="9" x2="36" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="22%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#4F6BF6"/>
      <stop offset="80%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="doveDeep" x1="4" y1="23" x2="36" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#4361EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="48" height="48" rx="10.5" fill="url(#bg)"/>

  <!-- Dove shapes (scaled from 1024→48, similar proportions) -->
  <g transform="translate(4, 5.5) scale(0.046875)">
    <polygon points="340,390 140,330 100,430 170,510" fill="url(#dove)"/>
    <polygon points="520,475 300,610 330,600 430,485" fill="url(#doveDeep)"/>
    <ellipse cx="485" cy="425" rx="140" ry="62" transform="rotate(-12 485 425)" fill="url(#dove)"/>
    <polygon points="510,385 230,180 260,200 400,395" fill="url(#dove)"/>
    <polygon points="510,385 230,180 320,310" fill="#DDD6FE" opacity="0.1"/>
    <circle cx="635" cy="380" r="36" fill="url(#dove)"/>
    <polygon points="666,366 748,340 662,394" fill="url(#dove)"/>
    <ellipse cx="600" cy="393" rx="32" ry="24" transform="rotate(-25 600 393)" fill="url(#dove)"/>
    <line x1="310" y1="295" x2="255" y2="235" stroke="#0A0818" stroke-width="4" stroke-linecap="round" opacity="0.2"/>
    <line x1="195" y1="385" x2="140" y2="425" stroke="#0A0818" stroke-width="3" stroke-linecap="round" opacity="0.18"/>
    <line x1="205" y1="450" x2="150" y2="440" stroke="#0A0818" stroke-width="3" stroke-linecap="round" opacity="0.16"/>
    <circle cx="650" cy="373" r="9" fill="#0A0818" opacity="0.65"/>
